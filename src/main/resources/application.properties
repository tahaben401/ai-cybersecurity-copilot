spring.application.name=ai-cybersecurity-copilot


spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

logging.level.org.springframework.security=TRACE


scanner.semgrep.enabled=true
scanner.semgrep.timeout-seconds=300
scanner.semgrep.rulesets=auto,p/owasp-top-ten,p/cwe-top-25,p/security-audit,p/secrets
scanner.semgrep.excluded-dirs=node_modules,vendor,.git,build,dist,target,.idea,__pycache__
scanner.semgrep.max-file-size-bytes=1000000
scanner.semgrep.metrics-enabled=false
scanner.semgrep.max-findings=5000

scanner.codeql.enabled=true
scanner.codeql.timeout-seconds=600
scanner.codeql.languages=java,javascript,python